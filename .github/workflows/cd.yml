name: '📦 CD'

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ['master']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Make this callable from other workflows
  workflow_call:

  # Triggered via repository dispatch
  repository_dispatch:
    types: [DEPLOY_VAULT]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'state-of-being/pages'
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    name: '🌎 Deploy Vault'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: '📟 Checkout'
        uses: actions/checkout@v7
      - name: '🍔 Set up Bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: '✅ Install dependencies'
        run: bun install
      - name: '🥗 Generate diet macros index'
        run: bun run cli generate-diet-macros-index
      - name: '🛠️ Setup Pages'
        uses: actions/configure-pages@v6
      - name: '📤 Upload artifact'
        uses: actions/upload-pages-artifact@v5
        with:
          # Upload entire repository
          path: '.'
      - name: '🌎 Deploy to GitHub Pages'
        id: deployment
        uses: actions/deploy-pages@v5

  trigger-website-deployment:
    runs-on: ubuntu-latest
    name: '🎛️ Repo Dispatch Website Deployment'
    needs: [deploy]
    steps:
      - uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.TRIGGER_BUILD_SHIVEKKHURANA_DOT_COM }}
          repository: shivekkhurana/shivekkhurana.com
          event-type: DEPLOY_WEBSITE
