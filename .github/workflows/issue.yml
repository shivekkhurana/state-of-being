name: '🎫 Handle New Issue'

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: write
  pages: write
  id-token: write

jobs:
  process-issue:
    name: '👷 Process issue'
    if: github.event.issue.title == 'HealthDataExport' || github.event.issue.title == 'LocationDataExport'
    runs-on: ubuntu-latest
    steps:
      - name: '📦 Checkout'
        uses: actions/checkout@v7

      - name: '🏷️ Add processing label'
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['processing']
            })

      - name: '💬 Comment workflow status'
        uses: actions/github-script@v8
        with:
          script: |
            const workflowRunUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔄 [Workflow running](${workflowRunUrl})`
            })

      - name: '🍔 Set up Bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: '✅ Install dependencies'
        run: bun install

      - name: '🎫 Process issue data'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bun run cli process-issue \
            --issue-number "${{ github.event.issue.number }}" \
            --issue-title "${{ github.event.issue.title }}" \
            --issue-body "$ISSUE_BODY" \
            --issue-author "${{ github.event.issue.user.login }}" \
            --issue-created-at "${{ github.event.issue.created_at }}"

      - name: '🗄️ Commit vault back to repo'
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: '🤖 Save data to vault'
          commit_user_name: '0x4444'
          commit_user_email: '0x4444@users.noreply.github.com'
          commit_author: '0x4444 <0x4444@users.noreply.github.com>'
          file_pattern: vault/*

      - name: '✅ Close ingested issue'
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            });

      - name: '🏷️ Remove processing label'
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            try {
              github.rest.issues.removeLabel({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'processing'
              });
            } catch (error) {
              // Label might not exist or already removed, ignore
              console.log('Label removal skipped:', error.message);
            }

  trigger-cd:
    name: '🚀 Trigger CD Pipeline'
    runs-on: ubuntu-latest
    needs: [process-issue]
    if: success()
    steps:
      - uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          event-type: DEPLOY_VAULT
